<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexAuth — Next-Gen Secure Authentication</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration for Custom Animations & Theme -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                900: "#1e3a8a",
              },
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
              fadeIn: {
                "0%": { opacity: "0", transform: "scale(0.95)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
            },
            animation: {
              float: "float 6s ease-in-out infinite",
              fadeIn: "fadeIn 0.4s ease-out forwards",
            },
          },
        },
      };
    </script>

    <!-- External JavaScript Logic -->
    <script src="app.js" defer></script>
  </head>
  <body
    class="bg-gradient-to-br from-slate-50 via-white to-blue-50/50 text-slate-800 min-h-screen font-sans antialiased selection:bg-blue-600 selection:text-white flex items-center justify-center p-4 relative overflow-hidden"
  >
    <!-- Ambient Glowing Background Orbs (Royal Blue & Soft Indigo Tint) -->
    <div
      class="absolute -top-32 -left-32 w-96 h-96 bg-blue-200/40 rounded-full blur-3xl animate-float pointer-events-none"
    ></div>
    <div
      class="absolute -bottom-32 -right-32 w-96 h-96 bg-indigo-200/30 rounded-full blur-3xl animate-float pointer-events-none"
      style="animation-delay: -3s"
    ></div>

    <!-- Login Card Container (Royal White Glassmorphism) -->
    <main
      class="w-full max-w-md bg-white/80 backdrop-blur-2xl border border-slate-200/80 rounded-2xl shadow-xl shadow-slate-200/60 p-8 relative z-10 animate-fadeIn"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-50 text-blue-600 border border-blue-100 mb-3 shadow-sm"
        >
          <i data-lucide="shield-check" class="w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">
          Welcome back
        </h1>
        <p class="text-sm text-slate-500 mt-1">
          Sign in to your
          <span class="text-blue-600 font-semibold">ApexAuth</span> account
        </p>
      </div>

      <!-- Social Sign In Buttons -->
      <div class="grid grid-cols-2 gap-3 mb-6">
        <!-- GitHub Button -->
        <button
          type="button"
          class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 hover:text-slate-900 text-sm font-medium transition-all duration-200 active:scale-[0.98] shadow-sm"
        >
          <svg
            class="w-4 h-4 fill-slate-800"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.53 1.032 1.53 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
            />
          </svg>
          <span>GitHub</span>
        </button>

        <!-- Google Button -->
        <button
          type="button"
          class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 hover:text-slate-900 text-sm font-medium transition-all duration-200 active:scale-[0.98] shadow-sm"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
            />
          </svg>
          <span>Google</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-slate-200"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white/90 px-3 text-slate-400 font-medium"
            >Or continue with</span
          >
        </div>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-4" novalidate>
        <!-- Email Input -->
        <div>
          <label
            for="email"
            class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2"
            >Work Email</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400"
            >
              <i data-lucide="mail" class="w-4 h-4"></i>
            </div>
            <input
              type="email"
              id="email"
              required
              placeholder="alex@company.com"
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50/80 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-600 focus:ring-4 focus:ring-blue-500/10 text-sm transition-all duration-200"
            />
          </div>
          <p id="emailError" class="text-xs text-rose-500 mt-1 hidden">
            Please enter a valid email address.
          </p>
        </div>

        <!-- Password Input -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label
              for="password"
              class="block text-xs font-semibold text-slate-600 uppercase tracking-wider"
              >Password</label
            >
            <a
              href="#"
              class="text-xs text-blue-600 hover:text-blue-700 font-semibold transition-colors"
              >Forgot password?</a
            >
          </div>
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400"
            >
              <i data-lucide="lock" class="w-4 h-4"></i>
            </div>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••••••"
              class="w-full pl-10 pr-10 py-2.5 bg-slate-50/80 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-600 focus:ring-4 focus:ring-blue-500/10 text-sm transition-all duration-200"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none transition-colors"
              aria-label="Toggle password visibility"
            >
              <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
            </button>
          </div>
          <p id="passwordError" class="text-xs text-rose-500 mt-1 hidden">
            Password must be at least 6 characters.
          </p>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 rounded border-slate-300 bg-slate-50 text-blue-600 focus:ring-blue-500/20 focus:ring-offset-0 cursor-pointer"
          />
          <label
            for="remember"
            class="ml-2 text-sm text-slate-600 cursor-pointer select-none"
            >Remember this device for 30 days</label
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full mt-2 py-3 px-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl shadow-md shadow-blue-600/20 hover:shadow-lg hover:shadow-blue-600/30 transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.99] disabled:opacity-50"
        >
          <span>Sign In</span>
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </form>

      <!-- Sign Up Redirect -->
      <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account?
        <a
          href="#"
          class="text-blue-600 hover:text-blue-700 font-semibold transition-colors"
          >Create account</a
        >
      </p>
    </main>
  </body>
</html>
